# docker-compose.yml for Currency Converter Service
# Runtime packages: express, cors, better-sqlite3, dotenv
# Dev packages:     typescript, ts-node, nodemon, rimraf, @types/*
#
# Usage:
#   Dev mode:   docker compose up --build
#   Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DOTENV_DEBUG=true
      - PORT=3000
      - DB_PATH=/app/data/currency.db
      # Add API keys here or via .env file:
      # - FIXER_API_KEY=<your_key>
      # - OPEN_EXCHANGE_APP_ID=<your_key>
      # - CURRENCY_API_KEY=<your_key>
    volumes:
      - sqlite_data:/app/data
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    restart: unless-stopped
    command: npm run dev

volumes:
  sqlite_data:
